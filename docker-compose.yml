services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: retail
      POSTGRES_PASSWORD: retail
      POSTGRES_DB: retail_analytics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail -d retail_analytics"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend-core:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn backend_core.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  edge-ai:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m edge_ai
    environment:
      BACKEND_URL: http://backend-core:8000
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      backend-core:
        condition: service_started
    # Uncomment for GPU hosts
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

volumes:
  pgdata:
