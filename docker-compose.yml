services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: retail
      POSTGRES_PASSWORD: retail
      POSTGRES_DB: retail_analytics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail -d retail_analytics"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend-core:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn backend_core.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  edge-ai:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m edge_ai
    environment:
      BACKEND_URL: http://backend-core:8000
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      backend-core:
        condition: service_healthy
    # Uncomment for GPU hosts
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

  dashboard-ui:
    build:
      context: .
      dockerfile: dashboard-ui/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend-core:8000
      NEXT_PUBLIC_BRAND_SLUG: orzen-demo
      NEXT_PUBLIC_STORE_ID: store-001
      NEXT_PUBLIC_POLL_INTERVAL_MS: "10000"
    depends_on:
      backend-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
