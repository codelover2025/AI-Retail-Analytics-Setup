apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-core
  namespace: orzen-vision
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-core
  template:
    metadata:
      labels:
        app: backend-core
    spec:
      containers:
        - name: api
          image: orzen/backend-core:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: orzen-secrets
            - configMapRef:
                name: orzen-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-core
  namespace: orzen-vision
spec:
  selector:
    app: backend-core
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
